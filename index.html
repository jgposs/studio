<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>James Poss</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:wght@700&family=Inter:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    html, body { background-color: #f5f5f4; color: #1a1a18; }

    .stream {
      padding-left: clamp(24px, 8vw, 112px);
      padding-right: clamp(24px, 8vw, 112px);
      padding-bottom: 180px;
    }

    .entry {
      margin-bottom: clamp(40px, 6vw, 80px);
      max-width: 55vw;
      margin-left: auto;
      margin-right: auto;
    }

    .entry img { display: block; width: 100%; height: auto; }

    .entry-link {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .entry-link img { transition: opacity 0.2s ease; }
    .entry-link:hover img { opacity: 0.88; }

    .stream-divider {
      width: 32px;
      height: 1px;
      background: #d4d3cc;
      margin: 0 0 clamp(80px, 14vw, 180px);
    }

    @media (max-width: 600px) {
      .stream {
        padding-left: 20px;
        padding-right: 20px;
        padding-bottom: 100px;
      }
      .entry {
        margin-bottom: 64px;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <a class="fixed-label" href="/">James Poss</a>

  <nav class="fixed-nav">
    <a href="/">Work</a>
    <a href="/press">Press</a>
    <a href="/about">About</a>
  </nav>

  <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <div class="mobile-menu" id="mobile-menu">
    <a href="/" onclick="toggleMenu()">Work</a>
    <a href="/press" onclick="toggleMenu()">Press</a>
    <a href="/about" onclick="toggleMenu()">About</a>
  </div>

  <main class="stream" style="padding-top: 82px;">

    <div class="entry">
      <a href="/boot-bag-black" class="entry-link">
        <img src="images/boot-bag-black/Switch_Designs-051.jpg" alt="Boot Bag Black" loading="lazy">
      </a>
    </div>

    <div class="entry">
      <a href="/cornice-dresser" class="entry-link">
        <img src="images/cornice-dresser/UAL Model Garage Studio Shoot-189-1800.jpg" alt="Cornice Dresser" loading="lazy">
      </a>
    </div>

    <div class="entry">
      <a href="/team" class="entry-link">
        <img src="https://i.vimeocdn.com/video/834928613-e8d59ca57df8a0d1732f67dc6152d8accda0b51acb387f4e4df954a995cee234-d_640?region=us" alt="TEAM — MiniDV" loading="lazy">
      </a>
    </div>

    <div class="entry">
      <a href="/boot-bag-coyote" class="entry-link">
        <img src="images/boot-bag-coyote/Switch_Designs-1029.jpg" alt="Boot Bag Coyote" loading="lazy">
      </a>
    </div>

    <div class="entry">
      <a href="/creative-switch-pt1" class="entry-link">
        <img src="images/creative-switch-pt1/LobozzoPeter_078.jpg" alt="Creative — Switch PT1" loading="lazy">
      </a>
    </div>

    <div class="entry">
      <a href="/bullet-glove" class="entry-link">
        <img src="images/bullet-glove/Switch Gloves-013.jpg" alt="Bullet Glove" loading="lazy">
      </a>
    </div>

    <div class="entry">
      <a href="/switch-team-edit" class="entry-link">
        <img src="https://i.vimeocdn.com/video/748794637-43252e7d2a9db9283da4d3371c4625923daf96467131232dc9c94d0e88b429db-d_640?region=us" alt="Switch Team Edit" loading="lazy">
      </a>
    </div>

    <div class="entry">
      <a href="/creative-switch-pt3" class="entry-link">
        <img src="images/creative-switch-pt3/Val d'Isere Switch Shoot 1.jpg" alt="Creative — Switch PT3" loading="lazy">
      </a>
    </div>

    <div class="entry">
      <a href="/creative-switch-pt2" class="entry-link">
        <img src="images/creative-switch-pt2/LobozzoPeter-2.jpg" alt="Creative — Switch PT2" loading="lazy">
      </a>
    </div>

  </main>

  <script>
    function toggleMenu() {
      document.getElementById('hamburger').classList.toggle('open');
      document.getElementById('mobile-menu').classList.toggle('open');
    }
  </script>

</body>
</html>
