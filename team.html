<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEAM — James Poss</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background-color: #fafaf9;
      color: #1a1a18;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      height: 100%;
    }

    .fixed-label {
      position: fixed;
      top: 24px;
      left: 32px;
      font-family: 'Libre Bodoni', serif;
      font-size: 22px;
      font-weight: 700;
      color: #1a1a18;
      z-index: 9999;
      text-transform: uppercase;
      text-decoration: none;
    }

    .fixed-nav {
      position: fixed;
      top: 26px;
      right: 32px;
      z-index: 9999;
      display: flex;
      gap: 28px;
    }

    .fixed-nav a {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #1a1a18;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .fixed-nav a:hover {
      color: #555;
    }

    .project-layout {
      display: grid;
      grid-template-columns: 300px 55vw;
      min-height: 100vh;
      padding-top: 82px;
      max-width: 1100px;
      margin-left: auto;
      margin-right: auto;
    }

    .project-info {
      position: sticky;
      top: 82px;
      height: calc(100vh - 82px);
      padding: 0 40px 48px 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .info-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .project-back {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: #888880;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .project-back:hover {
      color: #1a1a18;
    }

    .info-value {
      font-size: 13px;
      font-weight: 400;
      color: #1a1a18;
      line-height: 1.6;
    }

    .info-value.title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .project-images {
      padding: 0 48px 160px 0;
      display: flex;
      flex-direction: column;
      gap: clamp(16px, 3vw, 32px);
    }

    .project-video {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
    }

    .project-video iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .project-back-mobile {
      display: none;
    }

    @media (max-width: 768px) {
      .project-back-desktop {
        display: none;
      }

      .project-back-mobile {
        display: block;
        padding: 40px 20px 100px;
      }

      .project-layout {
        grid-template-columns: 1fr;
        padding-top: 82px;
      }

      .project-info {
        position: static;
        height: auto;
        padding: 0 20px 24px;
        gap: 20px;
      }

      .project-images {
        padding: 0 20px 100px;
      }
    }

    @media (max-width: 600px) {
      .fixed-label {
        font-size: 14px;
        top: 18px;
        left: 20px;
      }

      .fixed-nav {
        top: 20px;
        right: 20px;
        gap: 20px;
      }

      .fixed-nav a {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>

  <a class="fixed-label" href="index.html">James Poss</a>

  <nav class="fixed-nav">
    <a href="index.html">Work</a>
    <a href="index.html#about">About</a>
  </nav>

  <div class="project-layout">

    <aside class="project-info">
      <div class="info-block">
        <span class="info-value title">TEAM — MiniDV — 2019</span>
      </div>
      <div class="info-block">
        <span class="info-value">Filmed at Switch Week in Colorado. Breckenridge and Copper Mountain. Shot on MiniDV. Edited by James Poss.</span>
      </div>
      <div class="info-block project-back-desktop" style="padding-top: 20px;">
        <a class="project-back" href="index.html">&#8249; BACK</a>
      </div>
    </aside>

    <div class="project-images">
      <div class="project-video">
        <iframe src="https://player.vimeo.com/video/375987313?title=0&byline=0&portrait=0" allowfullscreen></iframe>
      </div>
    </div>

    <a class="project-back project-back-mobile" href="index.html">&#8249; BACK</a>

  </div>

</body>
</html>
