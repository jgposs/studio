<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEAM — James Poss</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background-color: #fafaf9;
      color: #1a1a18;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    .fixed-label {
      position: fixed;
      top: 24px;
      left: 32px;
      font-family: 'Libre Bodoni', serif;
      font-size: 22px;
      font-weight: 700;
      
      color: #1a1a18;
      z-index: 9999;
      text-transform: uppercase;
      text-decoration: none;
    }

    .fixed-nav {
      position: fixed;
      top: 26px;
      right: 32px;
      z-index: 9999;
      display: flex;
      gap: 28px;
    }

    .fixed-nav a {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      
      color: #1a1a18;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .fixed-nav a:hover {
      color: #1a1a18;
    }

    .project-images {
      padding-top: 80px;
      padding-bottom: 160px;
    }

    .project-video,
    .project-image-caption {
      max-width: 60vw;
      margin-left: auto;
      margin-right: auto;
      margin-bottom: clamp(16px, 3vw, 32px);
    }

    .project-video {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
    }

    .project-video iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .project-image-caption {
      margin-bottom: clamp(16px, 3vw, 32px);
    }

    .project-caption-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }

    .project-title {
      font-family: 'Inter', sans-serif;
      font-size: clamp(1rem, 1.6vw, 1.2rem);
      font-weight: 400;
      
      color: #1a1a18;
      line-height: 1;
      margin-bottom: 0;
      text-transform: uppercase;
    }

    .project-year {
      font-family: 'Inter', sans-serif;
      font-size: clamp(1rem, 1.6vw, 1.2rem);
      font-weight: 400;
      
      color: #1a1a18;
    }

    .project-desc {
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.9rem, 1.5vw, 1.05rem);
      font-weight: 400;
      line-height: 1.8;
      color: #3a3a36;
    }

    @media (max-width: 600px) {
      .fixed-label {
        font-size: 14px;
        top: 18px;
        left: 20px;
      }

      .fixed-nav {
        top: 20px;
        right: 20px;
        gap: 20px;
      }

      .fixed-nav a {
        font-size: 10px;
      }

      .project-images {
        padding-left: 20px;
        padding-right: 20px;
        padding-bottom: 100px;
      }
    }
  </style>
</head>
<body>

  <a class="fixed-label" href="index.html">James Poss</a>

  <nav class="fixed-nav">
    <a href="index.html">Work</a>
    <a href="index.html#about">About</a>
  </nav>

  <div class="project-images">

    <div class="project-video">
      <iframe src="https://player.vimeo.com/video/375987313?title=0&byline=0&portrait=0" allowfullscreen></iframe>
    </div>

    <div class="project-image-caption">
      <div class="project-caption-row">
        <h1 class="project-title">TEAM — MiniDV</h1>
        <span class="project-year">2019</span>
      </div>
      <p class="project-desc">Filmed at Switch Week in Colorado. Breckenridge and Copper Mountain. Shot on MiniDV. Edited by James Poss.</p>
    </div>

  </div>

</body>
</html>
